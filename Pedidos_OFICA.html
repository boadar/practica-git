<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#009DDC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pedidos OFICA">
<title>Pedidos OFICA</title>
</head>
<body>
<!--INNER_START-->
<style>
  *,*::before,*::after{box-sizing:border-box}
  :root{
    --bg:#EEF1F5; --surface:#FFFFFF; --surface-2:#F6F8FB;
    --ink:#14202B; --ink-2:#58687A; --ink-3:#8A97A4;
    --line:#DCE3EA; --line-2:#E9EEF3;
    --brand:#009DDC; --brand-ink:#016A9B; --brand-tint:#E1F5FC;
    --active:#0E8A5F; --active-tint:#E2F3EC;
    --warn:#B26A00; --warn-tint:#FBF0DE; --crit:#C0392B; --crit-tint:#FBE7E4;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --shadow:0 1px 2px rgba(20,32,43,.06),0 3px 10px rgba(20,32,43,.07);
    --shadow-up:0 -2px 12px rgba(20,32,43,.10);
    --r:12px;
  }
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-variant-numeric:tabular-nums; line-height:1.4;
  }
  .num{font-variant-numeric:tabular-nums}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit}
  :focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px}

  .app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* ===== App bar ===== */
  .appbar{
    position:sticky;top:0;z-index:30;background:var(--brand);color:#fff;
    padding:calc(env(safe-area-inset-top) + 8px) 14px 8px;
    box-shadow:0 2px 8px rgba(0,120,170,.28);
  }
  .appbar .row{display:flex;align-items:center;gap:6px 8px;flex-wrap:wrap}
  .appbtns{display:flex;align-items:center;gap:8px;flex:0 0 auto;margin-left:auto}
  .stocktoggle{
    -webkit-appearance:none;appearance:none;border:1px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:5px 7px;
    font-size:9.5px;font-weight:700;line-height:1.12;cursor:pointer;flex:0 0 auto;
    display:flex;align-items:center;gap:5px;max-width:98px;text-align:left
  }
  .stocktoggle svg{width:14px;height:14px;flex:0 0 auto}
  .stocktoggle[aria-pressed="true"]{background:#fff;color:var(--brand);border-color:#fff}
  .stocktoggle[aria-pressed="true"] svg line{stroke:var(--crit)}
  .logo{
    width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.16);
    display:grid;place-items:center;font-weight:800;font-size:19px;letter-spacing:.5px;flex:0 0 auto;
    border:1px solid rgba(255,255,255,.25);
  }
  .titlewrap{min-width:130px;flex:1 1 150px}
  .appbar h1{font-size:17px;font-weight:700;margin:0;letter-spacing:.2px}
  .appbar .sub{font-size:14px;color:#fff;opacity:1;margin-top:2px;font-weight:700;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .appbar .spacer{flex:1}
  .iconbtn{
    -webkit-appearance:none;appearance:none;border:1px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:8px 11px;
    font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    flex:0 0 auto;white-space:nowrap;
  }
  .iconbtn:active{background:rgba(255,255,255,.24)}
  .iconbtn .ic-save{display:none}
  .iconbtn.saving{background:#fff;color:var(--crit);border-color:#fff}
  .iconbtn.saving .ic-list{display:none}
  .iconbtn.saving .ic-save{display:inline}
  .iconbtn.saving .btnlabel{font-weight:800;letter-spacing:.5px}

  /* ===== Order meta (cliente) ===== */
  .meta{
    position:fixed;top:var(--catoffset,150px);left:0;right:0;max-width:720px;margin:0 auto;z-index:28;
    background:var(--surface);border-bottom:1px solid var(--line);
    max-height:calc(100dvh - var(--catoffset,150px) - 74px);overflow-y:auto;
    box-shadow:0 12px 26px rgba(20,32,43,.22)
  }
  .meta[hidden]{display:none}
  .meta-backdrop{position:fixed;left:0;right:0;top:var(--catoffset,150px);bottom:0;background:rgba(20,32,43,.35);z-index:27}
  .meta-backdrop[hidden]{display:none}
  .meta .grid{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field.full{grid-column:1 / -1}
  .rowcli{grid-column:1 / -1;display:grid;grid-template-columns:1fr 84px;gap:10px}
  .row3{grid-column:1 / -1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .row3 .field label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .field label{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-3)}
  .field input,.field select,.field textarea{
    border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:14px;color:var(--ink);
    background:var(--surface-2);width:100%;
  }
  .field textarea{resize:vertical;min-height:38px}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand);background:#fff}

  /* ===== Toolbar ===== */
  .toolbar{position:sticky;top:var(--appbar-h,64px);z-index:20;background:var(--bg);padding:10px 14px 6px}
  .search{position:relative}
  .search input{
    width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px 11px 38px;
    font-size:15px;background:var(--surface);box-shadow:var(--shadow)
  }
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  .search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--ink-3);font-size:18px;cursor:pointer;padding:4px 8px;display:none}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:9px 2px 3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
    padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap
  }
  .chip[aria-pressed="true"]{background:var(--brand);border-color:var(--brand);color:#fff}
  .chip.flag[aria-pressed="true"]{background:var(--active);border-color:var(--active)}
  .chip .count{opacity:.7;font-weight:600;margin-left:4px}

  /* ===== List ===== */
  .list{flex:1;padding:4px 0 150px}
  .cathead{
    position:sticky;top:var(--catoffset,150px);z-index:10;background:#FFF200;
    padding:7px 16px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#14202B;
    border-top:1px solid #E6D600;border-bottom:1px solid #E6D600;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px
  }
  .cathead .catname{min-width:0;line-height:1.1;font-size:14px}
  .cathead.solita .catname{color:#009DDC}
  .cathead .catlogo{height:15px;width:auto;display:block;justify-self:center}
  .cathead .n{justify-self:end;color:#7A5B00;font-weight:700;letter-spacing:0;font-size:12px}
  .cathead.ofica{background:#282828;color:#fff;border-top-color:#111;border-bottom-color:#111}
  .cathead.ofica .n{color:#AEB7C0}
  .cathead.alher{background:#E9F5C6;border-top-color:#D3E6A6;border-bottom-color:#D3E6A6}
  .cathead.alher .catname{color:#8B57A5}
  .cathead.alher .n{color:#9A7BB0}
  .prod{
    display:flex;flex-direction:row;gap:12px;align-items:flex-start;
    padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--line-2);
    position:relative
  }
  .pbody{flex:1;min-width:0;display:flex;flex-direction:column;gap:7px}
  .thumb{width:72px;height:72px;flex:0 0 auto;border:1px solid var(--line);border-radius:9px;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .thumb img{width:100%;height:100%;object-fit:contain}
  .thumb.ph{background:var(--surface-2);color:var(--ink-3)}
  .thumb.ph svg{width:38%;height:38%}
  .prow{display:flex;justify-content:space-between;align-items:center;gap:6px 8px;flex-wrap:wrap}
  .prow .invline{flex:0 1 auto;min-width:0}
  .prow .right{flex:0 0 auto;gap:8px;margin-left:auto}
  .linetot{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;min-width:52px}
  .linetot .lt-lbl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--ink-3);line-height:1}
  .linetot .lt-val{font-size:11.5px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.25;min-height:15px;white-space:nowrap}
  .linetot.off{opacity:.4}
  .prod::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent}
  .prod.on::before{background:var(--active)}
  .prod.on{background:var(--active-tint)}
  .info{min-width:0}
  .name{font-size:14px;font-weight:600;color:var(--ink);margin:0;line-height:1.3}
  .name .pcode{font-weight:700;color:var(--ink);letter-spacing:.3px}
  .sub{display:flex;flex-wrap:wrap;gap:6px 8px;align-items:baseline;font-size:15px;color:var(--ink-2)}
  .plabel{font-weight:700;color:var(--ink)}
  .price{font-weight:700;color:#1D4ED8}
  .sep{color:var(--ink-3);font-weight:700}
  .price .was{font-weight:500;color:var(--ink-3);text-decoration:line-through;margin-right:5px}
  .tag{font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.2px;text-transform:uppercase}
  .tag.disc{background:var(--brand-tint);color:var(--brand-ink)}
  .tag.exento{background:var(--active-tint);color:var(--active)}
  .right{display:flex;align-items:center;gap:10px;flex:0 0 auto}
  .umvbox{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:11.5px;font-weight:700;color:var(--ink-2);white-space:nowrap;background:var(--surface);text-align:center;line-height:1.15}
  .qtycol{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto}
  .bultopedbox{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    border:1px solid var(--line);border-radius:9px;background:var(--surface);
    padding:3px 8px;min-width:108px;line-height:1.1;white-space:nowrap;text-align:center
  }
  .bultopedbox .bplbl{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--ink-3)}
  .bultopedbox .bpval{font-size:13px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1}
  .prod.on .bultopedbox .bpval{color:var(--active)}
  .prod.on .bultopedbox{border-color:#BFE3D2}
  .invline{margin-top:6px;display:flex;align-items:center;gap:8px}
  .inv{font-size:13px;font-weight:800;letter-spacing:.2px;display:inline-flex;align-items:baseline;gap:5px}
  .inv b{font-weight:800}
  .inv.ok{color:var(--active)} .inv.low{color:var(--warn)} .inv.no{color:var(--crit)}
  .inv .u{font-size:11px;font-weight:600}

  /* stepper */
  .stepper{display:flex;align-items:center;gap:0;flex:0 0 auto}
  .stepper button{
    width:34px;height:34px;border:1px solid var(--line);background:var(--surface);color:var(--brand);
    font-size:19px;font-weight:600;cursor:pointer;display:grid;place-items:center;line-height:1;padding:0
  }
  .stepper button:active{background:var(--brand-tint)}
  .stepper .minus{border-radius:9px 0 0 9px}
  .stepper .plus{border-radius:0 9px 9px 0}
  .stepper input{
    width:40px;height:34px;text-align:center;border:1px solid var(--line);border-left:0;border-right:0;
    font-size:13px;font-weight:700;color:var(--ink);background:var(--surface);padding:0;-moz-appearance:textfield
  }
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .prod.on .stepper input{color:var(--active)}
  .prod.on .stepper button{border-color:#BFE3D2}
  .stepper button:disabled{opacity:.4;cursor:not-allowed;background:var(--surface-2);color:var(--ink-3)}
  .stepper input:disabled{opacity:.55;background:var(--surface-2);cursor:not-allowed}
  .nostock{font-size:11px;font-weight:800;color:var(--crit);background:var(--crit-tint);padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.3px}
  /* Producto agotado: todo en gris claro, solo INV. y "Sin stock" quedan en rojo */
  .prod.agotado{background:var(--surface-2)}
  .prod.agotado .name,
  .prod.agotado .pcode,
  .prod.agotado .plabel,
  .prod.agotado .price,
  .prod.agotado .sep,
  .prod.agotado .was{color:#B4BCC5}
  .prod.agotado .umvbox{color:#B4BCC5;background:var(--surface-2);border-color:var(--line-2)}
  .prod.agotado .tag.exento{color:#9AA3AC;background:#EDEFF2}
  .prod.agotado .thumb{opacity:.5}

  .empty{text-align:center;color:var(--ink-3);padding:60px 24px;font-size:14px}

  /* ===== Totals bar ===== */
  .totbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--surface);
    box-shadow:var(--shadow-up);border-top:1px solid var(--line);
    padding:6px 12px calc(env(safe-area-inset-bottom) + 6px);
    max-width:720px;margin:0 auto
  }
  .totline{display:flex;align-items:center;gap:12px;justify-content:space-between}
  .totline .lead{display:flex;flex-direction:row;align-items:baseline;gap:8px;flex-wrap:wrap}
  .totline .big{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
  .totline .meta2{font-size:11px;color:var(--ink-2);font-weight:600}
  .totline .toggle{border:none;background:none;color:var(--brand);font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
  .breakdown{display:none;margin:10px 0 4px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden}
  .breakdown.open{display:block}
  .breakdown .r{display:flex;justify-content:space-between;padding:7px 12px;font-size:13px;border-bottom:1px solid var(--line-2)}
  .breakdown .r:last-child{border-bottom:0}
  .breakdown .r span:first-child{color:var(--ink-2)}
  .breakdown .r.sub{background:var(--surface-2);font-weight:700}
  .breakdown .r.disc em{font-style:normal;color:var(--ink-3);font-weight:600}
  .breakdown .r.tot{background:var(--brand-tint);color:var(--brand-ink);font-weight:800;font-size:15px}
  .breakdown .r.disc span:last-child{color:var(--active)}
  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:7px}
  .btn{
    -webkit-appearance:none;appearance:none;border:1px solid var(--line);background:var(--surface);
    color:var(--ink);border-radius:9px;padding:6px 4px;font-size:11px;font-weight:700;cursor:pointer;
    display:flex;flex-direction:row;align-items:center;justify-content:center;gap:5px;line-height:1
  }
  .btn svg{width:14px;height:14px;flex:0 0 auto}
  .btn:active{background:var(--surface-2)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:active{background:var(--brand-ink)}
  .btn.ghost{color:var(--crit)}
  .btn[disabled]{opacity:.45;pointer-events:none}

  /* ===== Modal (resumen) ===== */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(20,32,43,.5);display:none;align-items:flex-end;justify-content:center}
  .modal.open{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:720px;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:up .22s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){.sheet{animation:none}}
  .sheet header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--line)}
  .sheet header h2{margin:0;font-size:16px;font-weight:800}
  .rtotals{display:grid;grid-template-columns:1fr 82px 82px;gap:10px;align-items:end;padding:8px 16px 10px;border-bottom:2px solid var(--line);background:var(--surface-2)}
  .rtotals .lt-lbl{color:var(--ink-2);font-size:9px}
  .rtotals .lt-val{font-size:15px;color:var(--brand-ink)}
  .sheet .body{overflow:auto;padding:8px 0 16px}
  .sumrow{display:grid;grid-template-columns:1fr 82px 82px;gap:10px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line-2);background:var(--surface)}
  .sumrow .sinfo{min-width:0}
  .sumrow .name{font-size:13.5px;line-height:1.25}
  .sumrow small{color:var(--ink-3);font-size:11.5px}
  .closex{border:none;background:var(--surface);width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;color:var(--ink-2)}

  /* toast */
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 96px);transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:80;box-shadow:var(--shadow);max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== Print ===== */
  #print{display:none}
  @media print{
    body{background:#fff}
    .app{display:none !important}
    #print{display:block;color:#000;font-size:12px}
    @page{margin:14mm}
    #print h1{font-size:18px;margin:0 0 2px}
    #print .ph{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:10px}
    #print .pmeta{margin:8px 0 14px;font-size:12px;line-height:1.6}
    #print .pmeta b{display:inline-block;min-width:120px}
    #print table{width:100%;border-collapse:collapse}
    #print th,#print td{border:1px solid #999;padding:5px 7px;text-align:left}
    #print th{background:#eee;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
    #print td.n,#print th.n{text-align:right;font-variant-numeric:tabular-nums}
    #print tfoot td{font-weight:bold;background:#f4f4f4}
    #print .cat td{background:#e8eef3;font-weight:bold;text-transform:uppercase;font-size:11px}
  }
</style>

<div class="app">
  <div class="appbar">
    <div class="row">
      <div class="logo">O</div>
      <div class="titlewrap">
        <h1>Pedido</h1>
        <div class="sub" id="barSub">Nuevo pedido</div>
      </div>
      <div class="appbtns">
      <button class="stocktoggle" id="btnHideNoStock" aria-pressed="true" title="Mostrar/ocultar referencias sin inventario">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <span>Mostrar Ref. Sin Inventario</span>
      </button>
      <button class="iconbtn" id="btnMeta" aria-expanded="false">
        <svg class="ic-list" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 6h11M8 12h11M8 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>
        <svg class="ic-save" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        <span class="btnlabel">Detalle del pedido</span>
      </button>
      </div>
    </div>
  </div>

  <div class="meta-backdrop" id="metaBackdrop" hidden></div>
  <div class="meta" id="metaPanel" hidden>
    <div class="grid">
      <div class="field"><label>Fecha</label><input type="date" id="f_fecha"></div>
      <div class="field"><label>Vendedor</label>
        <select id="f_vendedor"><option value="">— Seleccionar —</option></select>
      </div>
      <div class="rowcli">
        <div class="field"><label>Nombre del cliente</label>
          <input type="text" id="f_cliente" list="dl_cli_nombre" placeholder="Escribe o elige el cliente" autocomplete="off">

const OFICA_CATS = new Set(['OFICINA - TIJERAS','OFICINA - FUNDAS','OFICINA - CORRECTORES Y BOLIGRAFOS','OFICINA - MARCADORES Y RESALTADORES']);
const ALHER_CATS = new Set(['ALHER - BLOCKS','ALHER - PASATIEMPO','ALHER - MAMPARA','ALHER - PAPELES','EXHIBIDORES']);
function brandOf(cat){ return ALHER_CATS.has(cat) ? 'alher' : (OFICA_CATS.has(cat) ? 'ofica' : 'solita'); }
function catDisplay(c){ c=String(c); if(c==='ALHER - MAMPARA') return 'MAMPARAS'; if(c==='ALHER - PASATIEMPO') return 'PASATIEMPOS'; return c.replace(/^OFICINA - /,'').replace(/^ALHER - /,''); }
const IVA_RATE = 0.16;
function imgFor(code){ const i = PIMG.map ? PIMG.map[code] : undefined; return (i!=null) ? PIMG.data[i] : null; }
const STORE_KEY = 'ofica_pedido_v1';

const _fmtNum2 = new Intl.NumberFormat('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt = { format:(n)=> '$ ' + _fmtNum2.format(+n||0) };
const fmtN = new Intl.NumberFormat('es-VE');
const $ = s=>document.querySelector(s);
const el = (t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const esc = s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

// descuentos globales (celdas G10 y H10 del formato), aplicados en cascada
function factorGlobal(){const d1=+state.meta.desc1||0,d2=+state.meta.desc2||0,d3=+state.meta.desc3||0;return (1-d1)*(1-d2)*(1-d3);}
function descLabel(){const ds=[+state.meta.desc1||0,+state.meta.desc2||0,+state.meta.desc3||0];const p=ds.filter(d=>d>0).map(d=>Math.round(d*100)+'%');return p.length?p.join(' + '):'—';}
function ivaRateOf(p){return String(p.exento).toUpperCase()==='SI'?0:IVA_RATE;}

// ---- estado ----
let state = {qty:{}, meta:{}};
function load(){
  try{const raw=localStorage.getItem(STORE_KEY); if(raw){const d=JSON.parse(raw); state.qty=d.qty||{}; state.meta=d.meta||{};}}catch(e){}
}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}},250);}

const byCode = {};
CATALOGO.forEach(p=>byCode[p.codigo]=p);
const CATS = [...new Set(CATALOGO.map(p=>p.categoria))];

// mapas de clientes para autocompletado enlazado (nombre <-> código)
const cliByNombre={}, cliByCod={};
CLIENTES.forEach(x=>{ if(x.n && !cliByNombre[x.n])cliByNombre[x.n]=x; if(x.c && !cliByCod[x.c])cliByCod[x.c]=x; });

function buildLists(){
  // Solo el vendedor se carga completo (son 8). Los clientes se filtran al escribir (optimizado para móvil).
  const sv=document.getElementById('f_vendedor');
  VENDEDORES.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sv.appendChild(o); });
}
// llena un datalist con hasta 40 coincidencias (evita cargar miles de nodos en el móvil)
function filtrarClientes(query, campo, dl, withLabel){
  const q=String(query||'').trim().toLowerCase();
  const min = campo==='c' ? 1 : 2;
  if(q.length<min){ dl.innerHTML=''; return; }
  let h='', n=0;
  for(let i=0;i<CLIENTES.length && n<40;i++){
    const x=CLIENTES[i]; const val=String(x[campo]||'').toLowerCase();
    if(val.includes(q)){
      h += withLabel ? '<option value="'+esc(x.c)+'">'+esc(x.n)+'</option>' : '<option value="'+esc(x.n)+'"></option>';
      n++;
    }
  }
  dl.innerHTML=h;
}

// ---- filtros ----
let filter = {q:'', cat:'', onlyOn:false, hideNoStock:true};

function visibleProducts(){
  const q = filter.q.trim().toLowerCase();
  return CATALOGO.filter(p=>{
    if(filter.cat && p.categoria!==filter.cat) return false;
    if(filter.onlyOn && !(state.qty[p.codigo]>0)) return false;
    if(filter.hideNoStock && Math.round(+p.inv||0)<=0 && !(state.qty[p.codigo]>0)) return false;
    if(q){
      const hay=(p.nombre+' '+p.codigo).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

// ---- totales ----
function totals(){
  let baseEx=0, baseImp=0, lineas=0, unidades=0;
  for(const code in state.qty){
    const qty=+state.qty[code]||0; if(qty<=0) continue;
    const p=byCode[code]; if(!p) continue;
    const importe=(+p.precioUsd||0)*qty;
    if(ivaRateOf(p)===0) baseEx+=importe; else baseImp+=importe;
    lineas++; unidades+=qty;
  }
  const f=factorGlobal();
  const subtotal=baseEx+baseImp;
  const baseExD=baseEx*f, baseImpD=baseImp*f;
  const descuento=subtotal-(baseExD+baseImpD);
  const iva=baseImpD*IVA_RATE;
  const total=baseExD+baseImpD+iva;
  return {baseEx,baseImp,subtotal,descuento,baseExD,baseImpD,iva,total,lineas,unidades};
}

// ================= EXCEL (.xlsx sin librerías) =================
const crcTable=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=(c>>>8)^crcTable[(c^b[i])&0xFF];return (c^0xFFFFFFFF)>>>0;}
function u16(n){return [n&0xFF,(n>>>8)&0xFF];}
function u32(n){return [n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF];}
function zip(files){
  const enc=new TextEncoder();
  let local=[], central=[], offset=0;
  files.forEach(f=>{
    const name=enc.encode(f.name); const data=f.data;
    const crc=crc32(data), size=data.length;
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(size),u32(size),u16(name.length),u16(0));
    local.push(new Uint8Array(lh),name,data);
    const ch=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(size),u32(size),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
    central.push(new Uint8Array(ch),name);
    offset+=lh.length+name.length+size;
  });
  const cs=central.reduce((a,x)=>a+x.length,0);
  const eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cs),u32(offset),u16(0)));
  const parts=[...local,...central,eocd];
  const total=parts.reduce((a,x)=>a+x.length,0);
  const out=new Uint8Array(total); let o=0;
  parts.forEach(x=>{out.set(x,o);o+=x.length;});
  return out;
}
function colName(i){let s='';i++;while(i>0){let m=(i-1)%26;s=String.fromCharCode(65+m)+s;i=(i-m-1)/26;}return s;}
function cellXml(r,ci,v){
  const ref=colName(ci)+r;
  if(typeof v==='number'&&isFinite(v)) return `<c r="${ref}"><v>${v}</v></c>`;
  return `<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${esc(v)}</t></is></c>`;
}
function sheetXml(rows){
  let body='';
  rows.forEach((cells,ri)=>{
    const r=ri+1;
    body+=`<row r="${r}">`+cells.map((v,ci)=>v===''||v==null?'':cellXml(r,ci,v)).join('')+`</row>`;
  });
  const cols=`<cols><col min="1" max="1" width="14"/><col min="2" max="2" width="46"/><col min="3" max="3" width="10"/><col min="4" max="9" width="13"/></cols>`;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">${cols}<sheetData>${body}</sheetData></worksheet>`;
}
function buildXlsx(rows){
  const enc=new TextEncoder();
  const ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
  const wb=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Pedido" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const wbr=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>`;
  const files=[
    {name:'[Content_Types].xml',data:enc.encode(ct)},
    {name:'_rels/.rels',data:enc.encode(rels)},
    {name:'xl/workbook.xml',data:enc.encode(wb)},
    {name:'xl/_rels/workbook.xml.rels',data:enc.encode(wbr)},
    {name:'xl/worksheets/sheet1.xml',data:enc.encode(sheetXml(rows))},
  ];
  return zip(files);
}
function orderRows(){
  const m=state.meta, t=totals(), f=factorGlobal();
  const d1=+m.desc1||0, d2=+m.desc2||0, d3=+m.desc3||0;
  const pct=x=>Math.round(x*100)+'%';
  const rows=[];
  rows.push(['PEDIDO OFICA']);
  rows.push(['Fecha',m.fecha||'']);
  rows.push(['Cliente',m.cliente||'', '', 'Código', m.codcliente||'']);
  rows.push(['Vendedor',m.vendedor||'', '', 'Condición', m.condicion||'']);
  rows.push(['Descuento 1',pct(d1),'Descuento 2',pct(d2),'Descuento 3',pct(d3)]);
  if(m.numped) rows.push(['# Pedido',m.numped]);
  if(m.obs) rows.push(['Observaciones',m.obs]);
  rows.push([]);
  rows.push(['Código','Producto','Exento','UMV','Cantidad','Precio Unit $','Precio c/desc','Importe c/desc']);
  CATALOGO.filter(p=>state.qty[p.codigo]>0).forEach(p=>{
    const qty=state.qty[p.codigo], net=(+p.precioUsd||0)*f, importe=net*qty;
    rows.push([p.codigo,p.nombre,ivaRateOf(p)?'NO':'SI',(+p.umv||0),qty,round2(p.precioUsd),round2(net),round2(importe)]);
  });
  rows.push([]);
  const tr=(label,val)=>['','','','','','',label,round2(val)];
  rows.push(tr('Base exenta',t.baseEx));
  rows.push(tr('Base imponible',t.baseImp));
  rows.push(tr('Subtotal',t.subtotal));
  rows.push(tr('Descuento',-t.descuento));
  rows.push(tr('Base exenta c/desc',t.baseExD));
  rows.push(tr('Base imponible c/desc',t.baseImpD));
  rows.push(tr('IVA (16%)',t.iva));
  rows.push(tr('TOTAL',t.total));
  return rows;
}
function round2(n){return Math.round((+n||0)*100)/100;}
function download(name,bytes,mime){
  const blob=new Blob([bytes],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);
}
function safeName(){
  const m=state.meta; const cli=(m.cliente||'pedido').replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-');
  return `Pedido-${cli}-${m.fecha||''}.xlsx`;
}

  const d=new Date(); state.meta.fecha=d.toISOString().slice(0,10);
  save();
  ['f_cliente','f_codcliente','f_condicion','f_numped','f_obs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_fecha').value=state.meta.fecha;
  filter.onlyOn=false; syncChips();
  render(); updateTotals(); toast('Nuevo pedido listo');
}

// ================= eventos =================
function wire(){
  // steppers (delegación)
  $('#list').addEventListener('click',e=>{
    const btn=e.target.closest('button[data-act]'); if(!btn) return;
    const row=btn.closest('.prod'); const code=row.dataset.code;
    const p=byCode[code]; const step=(p&&+p.umv>0)?+p.umv:1;
    let q=+state.qty[code]||0;
    q += btn.dataset.act==='inc'?step:-step;
    if(q<0)q=0;
    setQty(code,q); refreshRow(row); updateTotals();
    if(filter.onlyOn && !(state.qty[code]>0)) render();
  });
  $('#list').addEventListener('input',e=>{
    const inp=e.target.closest('input[data-inp]'); if(!inp) return;
    const row=inp.closest('.prod'); setQty(row.dataset.code,inp.value);
    row.classList.toggle('on',(+state.qty[row.dataset.code]||0)>0); refreshRow(row); updateTotals();
  });
  // recuerda el valor previo del cuadro al empezar a editarlo
  $('#list').addEventListener('focusin',e=>{
    const inp=e.target.closest('input[data-inp]'); if(!inp) return;
    inp.dataset.prev = +state.qty[inp.closest('.prod').dataset.code]||0;
  });
  // valida al terminar de escribir: la cantidad manual debe ser multiplo de la UMV
  $('#list').addEventListener('change',e=>{
    const inp=e.target.closest('input[data-inp]'); if(!inp) return;
    const row=inp.closest('.prod'); const code=row.dataset.code;
    const p=byCode[code]; const step=(p&&+p.umv>0)?+p.umv:1;
    const val=Math.max(0,Math.floor(+inp.value||0));
    if(step>1 && val>0 && val%step!==0){
      toast('La Cantidad no es multiplo de la UMV');
      const prev=+inp.dataset.prev||0;
      setQty(code,prev); inp.value=prev||'';
      row.classList.toggle('on',prev>0); refreshRow(row); updateTotals();
      return;
    }
    inp.dataset.prev=val;
  });
  // buscar
  const q=$('#q');
  q.addEventListener('input',()=>{filter.q=q.value; $('#qclear').style.display=q.value?'block':'none'; render();});
  $('#qclear').addEventListener('click',()=>{q.value='';filter.q='';$('#qclear').style.display='none';render();q.focus();});
  // chips
  $('#chips').addEventListener('click',e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    if(b.dataset.on){filter.onlyOn=!filter.onlyOn; if(filter.onlyOn)filter.cat='';}
    else {filter.cat=b.dataset.cat; filter.onlyOn=false;}
    syncChips(); render();
  });
  // meta panel
  function setMetaOpen(open){
    const p=$('#metaPanel'), btn=$('#btnMeta'), lbl=btn.querySelector('.btnlabel'), bd=$('#metaBackdrop');
    syncHeaderVars();
    if(open){ p.removeAttribute('hidden'); bd.removeAttribute('hidden'); btn.classList.add('saving'); lbl.textContent='GUARDAR'; p.scrollTop=0; }
    else { p.setAttribute('hidden',''); bd.setAttribute('hidden',''); btn.classList.remove('saving'); lbl.textContent='Detalle del pedido'; }
    btn.setAttribute('aria-expanded',open?'true':'false');
  }
  $('#btnMeta').addEventListener('click',()=> setMetaOpen($('#metaPanel').hasAttribute('hidden')) );
  $('#metaBackdrop').addEventListener('click',()=> setMetaOpen(false) );
  // ocultar/mostrar referencias sin inventario (texto de accion)
  const updateHideBtn=()=>{
    const b=$('#btnHideNoStock');
    b.setAttribute('aria-pressed',filter.hideNoStock?'true':'false');
    b.querySelector('span').textContent = filter.hideNoStock ? 'Mostrar Ref. Sin Inventario' : 'Ocultar Ref. Sin Inventario';
  };
  updateHideBtn();
  $('#btnHideNoStock').addEventListener('click',()=>{
    filter.hideNoStock=!filter.hideNoStock;
    updateHideBtn();
    render();
  });
  // breakdown
  $('#tToggle').addEventListener('click',()=>{
    const b=$('#breakdown'); b.classList.toggle('open');
    $('#tToggle').setAttribute('aria-expanded',b.classList.contains('open')?'true':'false');
  });
  // autocompletado cliente <-> código (filtrado ligero al escribir)
  const fc=$('#f_cliente'), fcc=$('#f_codcliente');
  const dlN=$('#dl_cli_nombre'), dlC=$('#dl_cli_cod');
  fc.addEventListener('input',()=>filtrarClientes(fc.value,'n',dlN,false));
  fcc.addEventListener('input',()=>filtrarClientes(fcc.value,'c',dlC,true));
  fc.addEventListener('change',()=>{
    const x=cliByNombre[fc.value.trim()];
    if(x){ fcc.value=x.c; state.meta.cliente=x.n; state.meta.codcliente=x.c; save(); updateTotals(); }
  });
  fcc.addEventListener('change',()=>{
    const x=cliByCod[fcc.value.trim()];
    if(x){ fc.value=x.n; state.meta.cliente=x.n; state.meta.codcliente=x.c; save(); updateTotals(); }
  });
  // acciones
  $('#aResumen').addEventListener('click',openResumen);
  $('#mClose').addEventListener('click',()=>$('#modal').classList.remove('open'));
  $('#modal').addEventListener('click',e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open');});
  $('#aExcel').addEventListener('click',exportExcel);
  $('#aPrint').addEventListener('click',doPrint);
  $('#aNew').addEventListener('click',newOrder);
}

// ---- PWA install hints (manifest + icono vía runtime) ----
function pwaSetup(){
  try{
    const icon='data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192"><rect width="192" height="192" rx="38" fill="#009DDC"/><text x="96" y="132" font-family="Arial" font-size="118" font-weight="800" fill="#fff" text-anchor="middle">O</text></svg>');
    const manifest={name:'Pedidos OFICA',short_name:'Pedidos',start_url:'.',display:'standalone',background_color:'#EEF1F5',theme_color:'#009DDC',icons:[{src:icon,sizes:'192x192',type:'image/svg+xml'},{src:icon,sizes:'512x512',type:'image/svg+xml'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const l=document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(blob); document.head.appendChild(l);
    const al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=icon; document.head.appendChild(al);
  }catch(e){}
}

// mantiene el buscador pegado bajo la barra y el panel de detalle como overlay
function syncHeaderVars(){
  const ab=document.querySelector('.appbar'), tb=document.querySelector('.toolbar');
  const ah=ab?ab.offsetHeight:0, th=tb?tb.offsetHeight:0;
  const s=document.documentElement.style;
  s.setProperty('--appbar-h', ah+'px');
  s.setProperty('--catoffset', (ah+th)+'px');
}

// ---- arranque ----
// La app SIEMPRE inicia en blanco: cantidades en 0 y sin descuentos.
try{ localStorage.removeItem(STORE_KEY); }catch(e){}
state = {qty:{}, meta:{}};
buildLists(); buildChips(); initMeta(); render(); updateTotals(); wire(); pwaSetup();
syncHeaderVars();
window.addEventListener('resize', syncHeaderVars);
if(window.ResizeObserver){ const ro=new ResizeObserver(syncHeaderVars); ro.observe(document.querySelector('.appbar')); ro.observe(document.querySelector('.toolbar')); }
</script>
